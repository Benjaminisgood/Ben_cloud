{% extends "base.html" %}
{% block content %}
<section class="card" data-reveal>
  <h2>Notice 阅读视图</h2>
  <p class="muted">按日期、用户、标签组合生成阅读页，便于集中回顾与整理。</p>
  <form id="notice-filter-form" class="notice-filter-grid">
    <label>
      日期
      <input type="date" name="day">
    </label>
    <label>
      用户
      <select name="user_id" id="notice-user">
        <option value="">全部用户</option>
      </select>
    </label>
    <label>
      标签
      <input type="text" name="tag" placeholder="输入标签">
    </label>
    <label>
      时间顺序
      <select name="order">
        <option value="asc">由早到晚</option>
        <option value="desc">由晚到早</option>
      </select>
    </label>
    <button type="submit">生成阅读页</button>
  </form>

  <p class="muted">支持从任意标签一键跳转到本页，并自动带入筛选条件。</p>
  <p class="muted" id="notice-render-meta" hidden></p>
</section>

<section class="card" id="notice-render-panel" data-reveal="80" hidden>
  <div class="notice-reader-toolbar" id="notice-reader-toolbar" role="toolbar" aria-label="阅读模式">
    <div class="notice-reader-group" role="group" aria-label="字号">
      <button type="button" class="secondary" data-notice-font="md" aria-pressed="true">标准字号</button>
      <button type="button" class="secondary" data-notice-font="lg" aria-pressed="false">大字号</button>
    </div>
    <div class="notice-reader-group" role="group" aria-label="媒体显示">
      <button type="button" class="secondary" data-notice-media="expand" aria-pressed="true">展开媒体</button>
      <button type="button" class="secondary" data-notice-media="collapse" aria-pressed="false">折叠媒体</button>
    </div>
    <div class="notice-reader-group" role="group" aria-label="字体风格">
      <button type="button" class="secondary" data-notice-family="sans" aria-pressed="true">无衬线</button>
      <button type="button" class="secondary" data-notice-family="serif" aria-pressed="false">衬线</button>
      <button type="button" class="secondary" data-notice-family="wenkai" aria-pressed="false">文楷</button>
      <button type="button" class="secondary" data-notice-family="mono" aria-pressed="false">等宽</button>
    </div>
    <div class="notice-reader-group" id="notice-context-toggle-group" role="group" aria-label="元信息显示">
      <button type="button" class="secondary" data-notice-context="hide" aria-pressed="false">仅正文</button>
      <button type="button" class="secondary" data-notice-context="show" aria-pressed="true">显示侧栏</button>
    </div>
    <div class="notice-reader-group notice-reader-group-translate" role="group" aria-label="翻译">
      <select id="notice-translate-lang" aria-label="翻译语言">
        <option value="en">英语</option>
        <option value="zh-CN">中文</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
      </select>
      <button type="button" class="secondary" id="notice-reader-translate">翻译正文</button>
    </div>
    <button type="button" class="secondary notice-reader-top" id="notice-reader-top">回到顶部</button>
  </div>
  <article id="notice-render-html" class="optimized-html"></article>
</section>
{% endblock %}
