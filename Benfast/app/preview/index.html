<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benfast 文档预览</title>
    <link rel="icon" href="/app/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <header class="shell-header">
      <div class="header-panel header-panel--top">
        <a class="brand-home" href="/app/">
          <span class="brand-mark">BF</span>
          <span class="brand-line">Document Library / 文档库</span>
        </a>
        <div class="header-tools">
          <div id="currentUserBadge" class="user-meta">成员信息加载中</div>
          <p id="appStatus" class="visually-hidden" aria-live="polite">正在加载预览页...</p>
        </div>
      </div>
      <div class="header-panel header-panel--context">
        <div class="context-breadcrumb">
          <a class="inline-link" href="/app/">文档库</a>
          <span>/</span>
          <a id="documentCrumbLink" class="inline-link" href="#">当前文档</a>
          <span>/</span>
          <strong id="pageCrumbTitle">当前页面</strong>
        </div>
        <nav class="context-tabs" aria-label="文档工作区">
          <a id="tabSettingsLink" class="tab-link" href="#">文档设置</a>
          <a id="tabOutlineLink" class="tab-link" href="#">目录管理</a>
          <a id="tabEditorLink" class="tab-link" href="#">写作</a>
          <a id="tabPreviewLink" class="tab-link is-active" href="#">预览</a>
          <a id="tabPublishLink" class="tab-link" href="#">发布</a>
        </nav>
      </div>
    </header>

    <main class="shell-main reader-grid">
      <aside class="sidebar-stack">
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Outline</p>
              <h2 id="bookTitleLabel">目录</h2>
            </div>
          </div>
          <ul id="outlineTree" class="tree-list"></ul>
        </section>
      </aside>

      <section class="content-stack">
        <div class="visually-hidden">
          <p class="eyebrow">Preview</p>
          <h1 id="pageTitleHeading">当前页面</h1>
          <p id="pageMetaHeading">正在读取页面信息...</p>
          <p id="pageSummaryLine">这里仅做阅读与审阅；正文修改请切回写作页。</p>
        </div>
        <article class="preview-reading-card preview-reading-card--document">
          <div id="preview" class="preview-surface preview-surface-article"></div>
        </article>
      </section>

      <aside class="sidebar-stack">
        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Edit Status</p>
              <h2>编辑状态</h2>
            </div>
          </div>
          <p id="lockSummary" class="panel-note">当前无人占用此页。</p>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Comments</p>
              <h2>评论协作</h2>
            </div>
          </div>
          <div class="form-grid form-grid-single">
            <label>评论内容
              <textarea id="commentInput" rows="4" placeholder="写下审阅意见或待补充点"></textarea>
            </label>
            <label>锚点
              <input id="commentAnchorInput" type="text" placeholder="例如：试剂安全" />
            </label>
            <div class="form-actions">
              <button id="postCommentBtn" class="primary" type="button">发送评论</button>
            </div>
          </div>
          <ul id="commentList" class="record-list"></ul>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Revisions</p>
              <h2>修订记录</h2>
            </div>
          </div>
          <ul id="revisionList" class="record-list"></ul>
        </section>
      </aside>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script type="module" src="/app/preview.js"></script>
  </body>
</html>
