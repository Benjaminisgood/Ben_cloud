<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benfast 文档发布</title>
    <link rel="icon" href="/app/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <header class="shell-header">
      <div class="header-panel header-panel--top">
        <a class="brand-home" href="/app/">
          <span class="brand-mark">BF</span>
          <span class="brand-line">Document Library / 文档库</span>
        </a>
        <div class="header-tools">
          <div id="currentUserBadge" class="user-meta">成员信息加载中</div>
          <p id="appStatus" class="visually-hidden" aria-live="polite">正在加载发布页...</p>
        </div>
      </div>
      <div class="header-panel header-panel--context">
        <div class="context-breadcrumb">
          <a class="inline-link" href="/app/">文档库</a>
          <span>/</span>
          <a id="documentCrumbLink" class="inline-link" href="#">当前文档</a>
          <span>/</span>
          <strong>发布</strong>
        </div>
        <nav class="context-tabs" aria-label="文档工作区">
          <a id="tabSettingsLink" class="tab-link" href="#">文档设置</a>
          <a id="tabOutlineLink" class="tab-link" href="#">目录管理</a>
          <a id="tabRootEditorLink" class="tab-link" href="#">写作</a>
          <a id="tabRootPreviewLink" class="tab-link" href="#">预览</a>
          <a id="tabPublishLink" class="tab-link is-active" href="#">发布</a>
        </nav>
      </div>
    </header>

    <main class="shell-main panel-grid panel-grid-2col">
      <section class="panel page-hero">
        <div>
          <p class="eyebrow">Release</p>
          <h2 id="publishBookTitle">发布到统一文档站</h2>
        </div>
        <p id="publishBookMeta" class="muted">正在读取文档发布信息...</p>
        <p id="publishedLink" class="panel-note">当前还没有发布记录。</p>
        <a id="openPublishedLink" class="text-link hidden-link" href="#" target="_blank" rel="noreferrer">打开当前正式站</a>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Publish Action</p>
            <h2>创建新发布</h2>
          </div>
        </div>
        <div class="form-grid form-grid-single">
          <label>发布说明
            <input id="publishMessageInput" type="text" placeholder="例如：发布 2026 春季版手册" />
          </label>
          <div class="form-actions">
            <button id="publishBookBtn" class="primary" type="button">发布到正式站</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Outline Snapshot</p>
            <h2>当前目录结构</h2>
          </div>
        </div>
        <ul id="outlineTree" class="tree-list"></ul>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">History</p>
            <h2>发布记录</h2>
          </div>
        </div>
        <ul id="publishList" class="record-list"></ul>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script type="module" src="/app/publish.js"></script>
  </body>
</html>
