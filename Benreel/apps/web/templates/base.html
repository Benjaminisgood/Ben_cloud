<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary: {{ theme.primary if theme else '#6d2d12' }};
            --secondary: {{ theme.secondary if theme else '#d4813c' }};
            --canvas: {{ theme.canvas if theme else '#ead7b2' }};
            --ink: {{ theme.ink if theme else '#23140f' }};
        }
    </style>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    {% block body %}{% endblock %}
    <script src="/static/app.js" defer></script>
</body>
</html>
