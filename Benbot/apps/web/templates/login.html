{% extends "base.html" %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">🤖</span>
      <h1 class="auth-title">Benbot</h1>
      <p class="auth-subtitle">统一入口 · 登录后可访问所有项目</p>
    </div>

    <form class="auth-form" action="/login" method="post">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input
          class="form-input"
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          autofocus
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button class="btn-primary" type="submit">登录</button>
    </form>

    <div class="auth-footer">
      <p>还没有账号？<a href="/register" class="auth-link">立即注册</a></p>
    </div>
  </div>
</div>

<style>
.auth-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 14px;
  color: #666;
}

.auth-link {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
}

.auth-link:hover {
  text-decoration: underline;
}
</style>
{% endblock %}
