<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 · Benome</title>
    <style>
        :root {
            --primary: #0f5a46;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --success: #28a745;
            --warning: #ffc107;
            --info: #17a2b8;
            --danger: #dc3545;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            opacity: 0.9;
        }
        .header nav a:hover { opacity: 1; }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .page-title {
            margin-bottom: 2rem;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: #6c757d;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 1.25rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 0.5rem;
        }
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-item {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .stat-item .label {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .chart-container {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            min-height: 300px;
        }
        .chart-placeholder {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .data-table th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text);
        }
        .data-table tr:hover {
            background: #f9f9f9;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        .refresh-btn:hover { opacity: 0.9; }
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            .header nav a {
                margin-left: 0.5rem;
                font-size: 0.9rem;
            }
            .page-title {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏠 ling 居家</h1>
        <nav>
            <a href="/admin/dashboard">管理后台</a>
            <a href="/admin/calendar">房态日历</a>
            <a href="/properties">浏览房源</a>
            <a href="/logout">退出</a>
        </nav>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>📊 数据统计</h1>
            <div>
                <button class="refresh-btn" onclick="loadAllStats()">🔄 刷新数据</button>
                <a href="/admin/dashboard" class="btn btn-secondary">返回管理后台</a>
            </div>
        </div>

        <!-- 概览统计 -->
        <div class="card">
            <h2>📈 平台概览</h2>
            <div class="stats-overview" id="overview-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 房源统计 -->
        <div class="card">
            <h2>🏠 房源分析</h2>
            <div id="property-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 预订统计 -->
        <div class="card">
            <h2>📅 预订分析</h2>
            <div id="booking-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 收入统计 -->
        <div class="card">
            <h2>💰 收入分析</h2>
            <div id="revenue-stats">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 格式化数字
        function formatNumber(num) {
            return num.toLocaleString();
        }

        function getAuthHeaders() {
            try {
                const raw = localStorage.getItem('benome_session_v1');
                if (!raw) return {};
                const parsed = JSON.parse(raw);
                if (parsed && parsed.userId) {
                    return { 'X-User-Id': String(parsed.userId) };
                }
            } catch (error) {
                console.warn('Failed to parse local session:', error);
            }
            return {};
        }

        // 格式化金额
        function formatMoney(amount) {
            return '¥' + (amount || 0).toLocaleString();
        }

        // 加载概览统计
        async function loadOverviewStats() {
            try {
                const response = await fetch('/api/statistics/overview', { headers: getAuthHeaders() });
                if (!response.ok) throw new Error('加载失败');
                const stats = await response.json();
                
                const container = document.getElementById('overview-stats');
                container.innerHTML = `
                    <div class="stat-item">
                        <div class="number" style="color: var(--primary);">${stats.active_properties}/${stats.total_properties}</div>
                        <div class="label">活跃房源 / 总房源</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--info);">${stats.total_users}</div>
                        <div class="label">总用户数</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--info);">${stats.active_users}</div>
                        <div class="label">活跃用户（30 天）</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--warning);">${stats.pending_bookings}</div>
                        <div class="label">待审核预订</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--success);">${stats.confirmed_bookings}</div>
                        <div class="label">已确认预订</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--warning);">${stats.bookings_this_month}</div>
                        <div class="label">本月预订</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--success);">${formatMoney(stats.revenue_this_month)}</div>
                        <div class="label">本月收入</div>
                    </div>
                    <div class="stat-item">
                        <div class="number" style="color: var(--success);">${formatMoney(stats.total_revenue)}</div>
                        <div class="label">累计收入</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load overview stats:', error);
                document.getElementById('overview-stats').innerHTML = 
                    '<div class="chart-placeholder">加载失败</div>';
            }
        }

        // 加载房源统计
        async function loadPropertyStats() {
            try {
                const response = await fetch('/api/statistics/properties', { headers: getAuthHeaders() });
                if (!response.ok) throw new Error('加载失败');
                const stats = await response.json();
                
                const container = document.getElementById('property-stats');
                
                let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">';
                
                // 城市分布
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">📍 城市分布</h3>';
                if (stats.by_city && stats.by_city.length > 0) {
                    html += '<table class="data-table">';
                    html += '<thead><tr><th>城市</th><th>房源数</th><th>占比</th></tr></thead>';
                    html += '<tbody>';
                    const total = stats.by_city.reduce((sum, item) => sum + item.count, 0);
                    stats.by_city.forEach(item => {
                        const percentage = ((item.count / total) * 100).toFixed(1);
                        html += `<tr>
                            <td>${item.city || '未设置'}</td>
                            <td>${item.count}</td>
                            <td>${percentage}%</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p class="chart-placeholder">暂无数据</p>';
                }
                html += '</div>';
                
                // 价格统计
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">💰 价格区间</h3>';
                html += '<table class="data-table">';
                html += '<tr><td>最低价格</td><td>' + formatMoney(stats.price_range.min_price) + '</td></tr>';
                html += '<tr><td>最高价格</td><td>' + formatMoney(stats.price_range.max_price) + '</td></tr>';
                html += '<tr><td>平均价格</td><td>' + formatMoney(stats.price_range.avg_price) + '</td></tr>';
                html += '</table>';
                html += '</div>';
                
                html += '</div>';
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Failed to load property stats:', error);
                document.getElementById('property-stats').innerHTML = 
                    '<div class="chart-placeholder">加载失败</div>';
            }
        }

        // 加载预订统计
        async function loadBookingStats() {
            try {
                const response = await fetch('/api/statistics/bookings?days=30', { headers: getAuthHeaders() });
                if (!response.ok) throw new Error('加载失败');
                const stats = await response.json();
                
                const container = document.getElementById('booking-stats');
                
                let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">';
                
                // 按状态统计
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">📊 预订状态分布（近 30 天）</h3>';
                if (stats.by_status && stats.by_status.length > 0) {
                    html += '<table class="data-table">';
                    html += '<thead><tr><th>状态</th><th>数量</th></tr></thead>';
                    html += '<tbody>';
                    stats.by_status.forEach(item => {
                        const statusNames = {
                            'pending': '待审核',
                            'pending_review': '待审核',
                            'confirmed': '已确认',
                            'rejected': '已拒绝',
                            'cancelled': '已取消'
                        };
                        html += `<tr>
                            <td>${statusNames[item.status] || item.status}</td>
                            <td>${item.count}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p class="chart-placeholder">暂无数据</p>';
                }
                html += '</div>';
                
                // 热门房源
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">🔥 热门房源（近 30 天）</h3>';
                if (stats.popular_properties && stats.popular_properties.length > 0) {
                    html += '<table class="data-table">';
                    html += '<thead><tr><th>排名</th><th>房源名称</th><th>预订次数</th></tr></thead>';
                    html += '<tbody>';
                    stats.popular_properties.forEach((item, index) => {
                        html += `<tr>
                            <td>${index + 1}</td>
                            <td>${item.title}</td>
                            <td>${item.booking_count}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p class="chart-placeholder">暂无数据</p>';
                }
                html += '</div>';
                
                html += '</div>';
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Failed to load booking stats:', error);
                document.getElementById('booking-stats').innerHTML = 
                    '<div class="chart-placeholder">加载失败</div>';
            }
        }

        // 加载收入统计
        async function loadRevenueStats() {
            try {
                const response = await fetch('/api/statistics/revenue?months=12', { headers: getAuthHeaders() });
                if (!response.ok) throw new Error('加载失败');
                const stats = await response.json();
                
                const container = document.getElementById('revenue-stats');
                
                let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">';
                
                // 收入概览
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">💰 收入概览</h3>';
                html += '<table class="data-table">';
                html += '<tr><td>累计总收入</td><td style="font-size: 1.25rem; font-weight: bold; color: var(--success);">' + formatMoney(stats.total_revenue) + '</td></tr>';
                html += '<tr><td>平均订单金额</td><td>' + formatMoney(stats.avg_order_value) + '</td></tr>';
                html += '</table>';
                html += '</div>';
                
                // 月度趋势
                html += '<div>';
                html += '<h3 style="margin-bottom: 1rem; color: var(--primary);">📈 月度收入趋势</h3>';
                if (stats.monthly_trend && stats.monthly_trend.length > 0) {
                    html += '<table class="data-table">';
                    html += '<thead><tr><th>月份</th><th>收入</th></tr></thead>';
                    html += '<tbody>';
                    const monthNames = ['1 月', '2 月', '3 月', '4 月', '5 月', '6 月', 
                                       '7 月', '8 月', '9 月', '10 月', '11 月', '12 月'];
                    stats.monthly_trend.forEach(item => {
                        html += `<tr>
                            <td>${monthNames[item.month - 1] || item.month + '月'}</td>
                            <td style="color: var(--success);">${formatMoney(item.revenue)}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p class="chart-placeholder">暂无数据</p>';
                }
                html += '</div>';
                
                html += '</div>';
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Failed to load revenue stats:', error);
                document.getElementById('revenue-stats').innerHTML = 
                    '<div class="chart-placeholder">加载失败</div>';
            }
        }

        // 加载所有统计
        function loadAllStats() {
            loadOverviewStats();
            loadPropertyStats();
            loadBookingStats();
            loadRevenueStats();
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadAllStats);
    </script>
</body>
</html>
