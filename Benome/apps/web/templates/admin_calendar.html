<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房态日历 · Benome</title>
    <style>
        :root {
            --primary: #0f5a46;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            opacity: 0.9;
        }
        .header nav a:hover { opacity: 1; }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .page-title {
            margin-bottom: 2rem;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: #6c757d;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 1.25rem;
        }
        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .calendar-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .calendar-nav button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .calendar-nav button:hover { opacity: 0.9; }
        .calendar-nav button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .current-month {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #ddd;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .calendar-header {
            background: var(--bg);
            padding: 0.75rem;
            text-align: center;
            font-weight: bold;
            color: var(--text-light);
        }
        .calendar-day {
            background: var(--card-bg);
            min-height: 120px;
            padding: 0.5rem;
            position: relative;
        }
        .calendar-day.other-month {
            background: #f9f9f9;
            color: #ccc;
        }
        .calendar-day.today {
            background: #e8f5e9;
        }
        .calendar-day.has-bookings {
            border-left: 3px solid var(--danger);
        }
        .day-number {
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .booking-count {
            background: var(--danger);
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
        }
        .booking-list {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .booking-item {
            background: var(--bg);
            padding: 0.25rem;
            margin-bottom: 0.25rem;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .booking-item.confirmed {
            border-left: 2px solid var(--success);
        }
        .booking-item.pending {
            border-left: 2px solid var(--warning);
        }
        .legend {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #ddd;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            .header nav a {
                margin-left: 0.5rem;
                font-size: 0.9rem;
            }
            .calendar-day {
                min-height: 80px;
            }
            .booking-list {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏠 ling 居家</h1>
        <nav>
            <a href="/admin/dashboard">管理后台</a>
            <a href="/properties">浏览房源</a>
            <a href="/logout">退出</a>
        </nav>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>📅 房态日历</h1>
            <a href="/admin/dashboard" class="btn btn-secondary">返回管理后台</a>
        </div>

        <div class="card">
            <h2>房源选择</h2>
            <select id="property-select" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
                <option value="">加载中...</option>
            </select>
        </div>

        <div class="card">
            <div class="calendar-controls">
                <div class="calendar-nav">
                    <button id="prev-month">◀ 上月</button>
                    <span class="current-month" id="current-month-display">2026 年 3 月</span>
                    <button id="next-month">下月 ▶</button>
                    <button id="today-btn" style="margin-left: 1rem;">今天</button>
                </div>
            </div>

            <div id="calendar-container">
                <div class="loading-state">
                    <h2>加载中...</h2>
                    <p>正在加载日历数据</p>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--danger);"></div>
                    <span>有预订</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--success); border-left: 2px solid var(--success);"></div>
                    <span>已确认</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--warning); border-left: 2px solid var(--warning);"></div>
                    <span>待审核</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f5e9;"></div>
                    <span>今天</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedPropertyId = null;
        let properties = [];
        let bookingsByDate = {};

        // 日期工具函数
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatMonth(year, month) {
            return `${year}年${month + 1}月`;
        }

        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        // 加载房源列表
        async function loadProperties() {
            try {
                const response = await fetch('/api/properties');
                properties = await response.json();
                
                const select = document.getElementById('property-select');
                if (properties.length === 0) {
                    select.innerHTML = '<option value="">暂无房源</option>';
                    return;
                }
                
                select.innerHTML = properties.map(p => 
                    `<option value="${p.id}">${p.title}</option>`
                ).join('');
                
                // 默认选择第一个房源
                if (properties.length > 0) {
                    selectedPropertyId = properties[0].id;
                    loadBookings();
                }
                
                select.addEventListener('change', (e) => {
                    selectedPropertyId = e.target.value ? parseInt(e.target.value) : null;
                    loadBookings();
                });
            } catch (error) {
                console.error('Failed to load properties:', error);
                document.getElementById('property-select').innerHTML = 
                    '<option value="">加载失败</option>';
            }
        }

        // 加载预订数据
        async function loadBookings() {
            if (!selectedPropertyId) {
                bookingsByDate = {};
                renderCalendar();
                return;
            }
            
            try {
                // 获取当前月份前后各 3 个月的预订
                const startMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() - 3, 1);
                const endMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 3, 0);
                
                const response = await fetch(`/api/bookings/admin?property_id=${selectedPropertyId}`);
                if (!response.ok) {
                    bookingsByDate = {};
                    renderCalendar();
                    return;
                }
                
                const bookings = await response.json();
                
                // 按日期组织预订数据
                bookingsByDate = {};
                bookings.forEach(booking => {
                    const checkIn = new Date(booking.check_in_date);
                    const checkOut = new Date(booking.check_out_date);
                    
                    // 遍历入住到退房之间的所有日期
                    let current = new Date(checkIn);
                    while (current < checkOut) {
                        const dateStr = formatDate(current);
                        if (!bookingsByDate[dateStr]) {
                            bookingsByDate[dateStr] = [];
                        }
                        bookingsByDate[dateStr].push({
                            id: booking.id,
                            guest_name: booking.guest_name,
                            status: booking.status
                        });
                        current = new Date(current.getTime() + 86400000);
                    }
                });
                
                renderCalendar();
            } catch (error) {
                console.error('Failed to load bookings:', error);
                bookingsByDate = {};
                renderCalendar();
            }
        }

        // 渲染日历
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('current-month-display').textContent = formatMonth(year, month);
            
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const daysInPrevMonth = getDaysInMonth(year, month - 1);
            
            const today = new Date();
            
            let html = '<div class="calendar-grid">';
            
            // 星期标题
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            weekdays.forEach(day => {
                html += `<div class="calendar-header">${day}</div>`;
            });
            
            // 上个月的日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            // 当月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = formatDate(date);
                const bookings = bookingsByDate[dateStr] || [];
                const isTodayDate = isToday(date);
                const hasBookings = bookings.length > 0;
                
                let dayClass = 'calendar-day';
                if (isTodayDate) dayClass += ' today';
                if (hasBookings) dayClass += ' has-bookings';
                
                html += `<div class="${dayClass}">`;
                html += `<div class="day-number">
                    ${day}
                    ${hasBookings ? `<span class="booking-count">${bookings.length}</span>` : ''}
                </div>`;
                
                if (hasBookings) {
                    html += '<div class="booking-list">';
                    bookings.slice(0, 3).forEach(booking => {
                        const statusClass = booking.status === 'confirmed' ? 'confirmed' : 'pending';
                        html += `<div class="booking-item ${statusClass}">${booking.guest_name}</div>`;
                    });
                    if (bookings.length > 3) {
                        html += `<div style="font-size: 0.75rem; color: #999;">+${bookings.length - 3} 更多</div>`;
                    }
                    html += '</div>';
                }
                
                html += '</div>';
            }
            
            // 下个月的日期（填充到 42 格）
            const totalCells = firstDay + daysInMonth;
            const nextMonthDays = 42 - totalCells;
            for (let day = 1; day <= nextMonthDays; day++) {
                html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            html += '</div>';
            
            document.getElementById('calendar-container').innerHTML = html;
        }

        // 导航事件
        document.getElementById('prev-month').addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
            renderCalendar();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            renderCalendar();
        });

        document.getElementById('today-btn').addEventListener('click', () => {
            currentDate = new Date();
            renderCalendar();
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadProperties();
        });
    </script>
</body>
</html>
