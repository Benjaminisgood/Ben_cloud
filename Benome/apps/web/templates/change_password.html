<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 · Benome</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        :root {
            --primary: #0f5a46;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --success: #28a745;
            --danger: #dc3545;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            opacity: 0.9;
        }
        .header nav a:hover { opacity: 1; }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .page-title {
            margin-bottom: 2rem;
            color: var(--primary);
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-block {
            width: 100%;
            text-align: center;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 1.25rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 90, 70, 0.1);
        }
        .help-text {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }
        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
        .password-strength-bar.weak {
            width: 33%;
            background: var(--danger);
        }
        .password-strength-bar.medium {
            width: 66%;
            background: var(--warning);
        }
        .password-strength-bar.strong {
            width: 100%;
            background: var(--success);
        }
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            .header nav a {
                margin-left: 0.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏠 ling 居家</h1>
        <nav>
            <a href="/dashboard">我的房源</a>
            <a href="/properties">浏览房源</a>
            <a href="/bookings">我的预订</a>
            <a href="/profile">个人资料</a>
            <a href="/logout">退出</a>
        </nav>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>🔐 修改密码</h1>
        </div>

        <div class="card">
            <h2>密码安全</h2>
            
            <div id="message-container"></div>

            <form id="change-password-form">
                <div class="form-group">
                    <label for="old_password">当前密码 *</label>
                    <input type="password" id="old_password" name="old_password" required 
                           placeholder="请输入当前密码">
                    <div class="help-text">为了安全，请先验证当前密码</div>
                </div>

                <div class="form-group">
                    <label for="new_password">新密码 *</label>
                    <input type="password" id="new_password" name="new_password" required 
                           minlength="6" placeholder="至少 6 位字符">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strength-bar"></div>
                    </div>
                    <div class="help-text">密码长度至少 6 位，建议包含字母、数字和符号</div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认新密码 *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           minlength="6" placeholder="再次输入新密码">
                    <div class="help-text" id="match-hint"></div>
                </div>

                <div class="alert alert-info">
                    <strong>💡 密码安全提示：</strong>
                    <ul style="margin-left: 1.5rem; margin-top: 0.5rem;">
                        <li>不要使用过于简单的密码（如 123456）</li>
                        <li>不要使用个人信息（如生日、手机号）</li>
                        <li>建议定期更换密码</li>
                        <li>不要与其他网站使用相同密码</li>
                    </ul>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-block">✅ 确认修改</button>
                    <a href="/profile" class="btn btn-secondary" style="flex: 1; text-align: center;">取消</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 密码强度检测
        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            return strength;
        }

        function updateStrengthBar(password) {
            const bar = document.getElementById('strength-bar');
            const strength = checkPasswordStrength(password);
            
            bar.className = 'password-strength-bar';
            
            if (password.length === 0) {
                bar.style.width = '0%';
            } else if (strength <= 2) {
                bar.classList.add('weak');
            } else if (strength <= 3) {
                bar.classList.add('medium');
            } else {
                bar.classList.add('strong');
            }
        }

        // 验证密码匹配
        function checkPasswordMatch() {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const matchHint = document.getElementById('match-hint');
            
            if (confirmPassword.length === 0) {
                matchHint.textContent = '';
                matchHint.style.color = '';
            } else if (newPassword === confirmPassword) {
                matchHint.textContent = '✅ 密码一致';
                matchHint.style.color = 'var(--success)';
            } else {
                matchHint.textContent = '❌ 密码不一致';
                matchHint.style.color = 'var(--danger)';
            }
        }

        function showMessage(message, type = 'info') {
            const container = document.getElementById('message-container');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            
            // 3 秒后自动消失
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function changePassword(event) {
            event.preventDefault();
            
            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            // 验证
            if (newPassword.length < 6) {
                showMessage('新密码长度不能少于 6 位', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('两次输入的新密码不一致', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/users/me/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                if (response.ok) {
                    showMessage('✅ 密码修改成功！3 秒后跳转到个人资料页...', 'success');
                    
                    // 清空表单
                    document.getElementById('change-password-form').reset();
                    updateStrengthBar('');
                    document.getElementById('match-hint').textContent = '';
                    
                    // 3 秒后跳转
                    setTimeout(() => {
                        window.location.href = '/profile';
                    }, 3000);
                } else {
                    const error = await response.json();
                    showMessage('❌ ' + (error.detail || '密码修改失败'), 'error');
                }
            } catch (error) {
                console.error('Failed to change password:', error);
                showMessage('❌ 网络错误，请稍后重试', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('change-password-form').addEventListener('submit', changePassword);
            
            // 实时密码强度检测
            document.getElementById('new_password').addEventListener('input', (e) => {
                updateStrengthBar(e.target.value);
                checkPasswordMatch();
            });
            
            // 实时密码匹配检测
            document.getElementById('confirm_password').addEventListener('input', checkPasswordMatch);
        });
    </script>
</body>
</html>
