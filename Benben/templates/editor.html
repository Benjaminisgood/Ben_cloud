<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benben Markdown 编辑器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #f4f6fb;
            color: #1f2937;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .toolbar h1 { font-size: 18px; margin-right: 8px; }
        .toolbar .meta { color: #6b7280; font-size: 12px; margin-right: 8px; }
        .toolbar select,
        .toolbar input {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 13px;
            min-width: 180px;
            background: #fff;
        }
        .btn {
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            color: #fff;
        }
        .btn-primary { background: #2563eb; }
        .btn-success { background: #0d9488; }
        .btn-danger { background: #dc2626; }
        .btn-template { background: #7c3aed; }
        .btn-muted { background: #4b5563; }
        .btn-export { background: #1d4ed8; }
        .editor-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
            overflow: hidden;
        }
        .pane {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .pane-header {
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            padding: 8px 12px;
            font-size: 12px;
            color: #4b5563;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #editor {
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            padding: 14px;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            line-height: 1.6;
            font-size: 13px;
        }
        #preview {
            flex: 1;
            overflow: auto;
            padding: 14px;
            line-height: 1.6;
            font-size: 14px;
        }
        #preview h1, #preview h2, #preview h3 { margin: 12px 0 10px; }
        #preview code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; }
        #preview pre { background: #111827; color: #f9fafb; padding: 12px; border-radius: 8px; overflow: auto; }
        #preview pre code { background: transparent; padding: 0; }
        #preview table { border-collapse: collapse; width: 100%; }
        #preview th, #preview td { border: 1px solid #e5e7eb; padding: 6px 8px; }
        #preview th { background: #f9fafb; }
        .status {
            position: fixed;
            right: 16px;
            bottom: 16px;
            background: #111827;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(8px);
            transition: all .25s;
            pointer-events: none;
        }
        .status.show { opacity: 1; transform: translateY(0); }
        .status.error { background: #dc2626; }
        .status.success { background: #059669; }
        .status.warn { background: #d97706; }
        #image-upload { display: none; }
        @media (max-width: 980px) {
            .editor-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>📝 Benben</h1>
        <span class="meta" id="session-meta">未登录</span>

        <select id="file-select">
            <option value="">选择文件...</option>
        </select>

        <select id="template-select">
            <option value="">选择模板...</option>
        </select>

        <input id="template-project" type="text" placeholder="项目名（用于模板变量）">

        <button class="btn btn-muted" onclick="createBlankFile()">➕ 新建空白</button>
        <button class="btn btn-template" onclick="createFromTemplate()">📄 模板新建</button>
        <button class="btn btn-primary" onclick="uploadImage()">📷 上传图片</button>
        <button class="btn btn-success" onclick="saveFile()">💾 保存</button>
        <select id="export-format">
            <option value="txt">导出 TXT</option>
            <option value="md">导出 Markdown</option>
            <option value="html">导出 HTML</option>
            <option value="png">导出 PNG 图片</option>
        </select>
        <button class="btn btn-export" onclick="exportCurrentNote()">⬇️ 导出</button>
        <button class="btn btn-danger" onclick="deleteFile()" id="delete-btn" disabled>🗑️ 删除</button>

        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
    </div>

    <div class="editor-container">
        <div class="pane">
            <div class="pane-header">
                <span>编辑区</span>
                <span id="editor-state">未选择文件</span>
            </div>
            <textarea id="editor" placeholder="开始编写 Markdown..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>预览</span>
                <span id="version-state">version: -</span>
            </div>
            <div id="preview"></div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const DRAFT_PREFIX = 'benben:draft:';
        const NEW_DRAFT_KEY = DRAFT_PREFIX + '__new__';

        let currentFile = '';
        let currentVersion = null;
        let currentUser = null;
        let isDirty = false;
        let autoSaveTimer = null;

        const editorEl = document.getElementById('editor');
        const previewEl = document.getElementById('preview');
        const fileSelectEl = document.getElementById('file-select');
        const templateSelectEl = document.getElementById('template-select');
        const exportFormatEl = document.getElementById('export-format');
        const versionStateEl = document.getElementById('version-state');
        const editorStateEl = document.getElementById('editor-state');
        const statusEl = document.getElementById('status');
        const sessionMetaEl = document.getElementById('session-meta');

        function draftKey(path) {
            return DRAFT_PREFIX + (path || '__new__');
        }

        function showStatus(message, type = 'success') {
            statusEl.textContent = message;
            statusEl.className = `status show ${type}`;
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, 2600);
        }

        function setDirty(nextDirty) {
            isDirty = nextDirty;
            editorStateEl.textContent = currentFile
                ? `${currentFile}${isDirty ? ' *' : ''}`
                : (isDirty ? '未命名文档 *' : '未选择文件');
        }

        function updatePreview(content) {
            previewEl.innerHTML = marked.parse(content || '');
        }

        function updateVersion(version) {
            currentVersion = version;
            versionStateEl.textContent = `version: ${version || '-'}`;
        }

        function saveDraftToLocal() {
            const payload = {
                path: currentFile || '',
                content: editorEl.value,
                version: currentVersion,
                updated_at: Date.now(),
            };
            localStorage.setItem(draftKey(currentFile), JSON.stringify(payload));
        }

        function clearDraft(path) {
            localStorage.removeItem(draftKey(path));
        }

        function maybeRestoreDraftForPath(path, serverContent) {
            const raw = localStorage.getItem(draftKey(path));
            if (!raw) return serverContent;

            try {
                const draft = JSON.parse(raw);
                if (draft.content === serverContent) {
                    clearDraft(path);
                    return serverContent;
                }
                const recover = confirm(`检测到本地草稿（${new Date(draft.updated_at).toLocaleString()}），是否恢复？`);
                if (recover) {
                    showStatus('已恢复本地草稿', 'warn');
                    setDirty(true);
                    return draft.content;
                }
                clearDraft(path);
            } catch (_e) {
                clearDraft(path);
            }
            return serverContent;
        }

        function maybeRestoreUnsavedDraft() {
            const raw = localStorage.getItem(NEW_DRAFT_KEY);
            if (!raw) return;
            try {
                const draft = JSON.parse(raw);
                if (!draft.content) return;
                const recover = confirm(`发现未命名草稿（${new Date(draft.updated_at).toLocaleString()}），是否恢复？`);
                if (!recover) return;
                currentFile = '';
                updateVersion(null);
                editorEl.value = draft.content;
                updatePreview(draft.content);
                setDirty(true);
                editorStateEl.textContent = '未命名文档 *';
                showStatus('已恢复未命名草稿', 'warn');
            } catch (_e) {
                localStorage.removeItem(NEW_DRAFT_KEY);
            }
        }

        function scheduleDraftAutoSave() {
            if (autoSaveTimer) {
                clearTimeout(autoSaveTimer);
            }
            autoSaveTimer = setTimeout(() => {
                saveDraftToLocal();
            }, 1200);
        }

        async function requestJSON(url, options = {}) {
            const res = await fetch(url, options);
            const data = await res.json().catch(() => ({}));
            return { res, data };
        }

        function resolveExportBaseName() {
            if (currentFile) {
                const fileName = currentFile.split('/').pop() || 'note.md';
                return fileName.replace(/\.md$/i, '') || 'note';
            }
            const date = new Date();
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `note-${y}${m}${d}-${hh}${mm}`;
        }

        function triggerDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = fileName;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            URL.revokeObjectURL(url);
        }

        function parseFilenameFromDisposition(disposition) {
            if (!disposition) return '';
            const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
            if (utf8Match) {
                try {
                    return decodeURIComponent(utf8Match[1]);
                } catch (_e) {
                    return utf8Match[1];
                }
            }
            const plainMatch = disposition.match(/filename="?([^\";]+)"?/i);
            return plainMatch ? plainMatch[1] : '';
        }

        function buildWrappedLines(ctx, text, maxWidth) {
            const source = (text || '').replace(/\r\n/g, '\n');
            const result = [];
            for (const rawLine of source.split('\n')) {
                if (!rawLine) {
                    result.push('');
                    continue;
                }
                let current = '';
                for (const char of rawLine) {
                    const next = current + char;
                    if (ctx.measureText(next).width > maxWidth && current) {
                        result.push(current);
                        current = char;
                    } else {
                        current = next;
                    }
                }
                result.push(current);
            }
            return result;
        }

        async function exportCurrentNote() {
            const format = exportFormatEl.value || 'txt';
            if (format === 'png') {
                exportAsPng();
                return;
            }

            const payload = {
                format,
                content: editorEl.value,
                file_name: resolveExportBaseName(),
            };

            const res = await fetch('/api/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (!res.ok) {
                const detail = await res.json().catch(() => ({}));
                showStatus(`导出失败：${detail.detail || '未知错误'}`, 'error');
                return;
            }

            const blob = await res.blob();
            const fileName =
                parseFilenameFromDisposition(res.headers.get('content-disposition')) ||
                `${resolveExportBaseName()}.${format}`;
            triggerDownload(blob, fileName);
            showStatus(`已导出 ${fileName}`, 'success');
        }

        function exportAsPng() {
            const sourceText = (previewEl.innerText || editorEl.value || '').trim();
            if (!sourceText) {
                showStatus('当前内容为空，无法导出图片', 'warn');
                return;
            }

            const canvas = document.createElement('canvas');
            const width = 1400;
            const padding = 48;
            const maxTextWidth = width - padding * 2;
            const lineHeight = 30;

            const ctx = canvas.getContext('2d');
            if (!ctx) {
                showStatus('当前浏览器不支持图片导出', 'error');
                return;
            }

            ctx.font = "22px 'PingFang SC', 'Microsoft YaHei', sans-serif";
            const title = resolveExportBaseName();
            ctx.font = "18px 'PingFang SC', 'Microsoft YaHei', sans-serif";
            const lines = buildWrappedLines(ctx, sourceText, maxTextWidth);
            const headerLines = 3;
            const height = Math.min(
                16000,
                padding * 2 + lineHeight * (headerLines + lines.length + 1),
            );

            canvas.width = width;
            canvas.height = height;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            let y = padding;
            ctx.fillStyle = '#111827';
            ctx.font = "bold 32px 'PingFang SC', 'Microsoft YaHei', sans-serif";
            ctx.fillText(title, padding, y);
            y += lineHeight + 8;

            ctx.font = "16px 'PingFang SC', 'Microsoft YaHei', sans-serif";
            ctx.fillStyle = '#6b7280';
            ctx.fillText(`导出时间：${new Date().toLocaleString()}`, padding, y);
            y += lineHeight + 8;

            ctx.strokeStyle = '#e5e7eb';
            ctx.beginPath();
            ctx.moveTo(padding, y);
            ctx.lineTo(width - padding, y);
            ctx.stroke();
            y += lineHeight;

            ctx.fillStyle = '#111827';
            ctx.font = "18px 'PingFang SC', 'Microsoft YaHei', sans-serif";
            for (const line of lines) {
                if (y > height - padding) {
                    break;
                }
                ctx.fillText(line || ' ', padding, y);
                y += lineHeight;
            }

            canvas.toBlob((blob) => {
                if (!blob) {
                    showStatus('图片导出失败', 'error');
                    return;
                }
                const fileName = `${resolveExportBaseName()}.png`;
                triggerDownload(blob, fileName);
                showStatus(`已导出 ${fileName}`, 'success');
            }, 'image/png');
        }

        async function loadSession() {
            const { res, data } = await requestJSON('/api/session');
            if (res.ok) {
                currentUser = data;
                sessionMetaEl.textContent = `登录用户：${data.username}（${data.role}）`;
                return;
            }
            sessionMetaEl.textContent = '未登录';
        }

        async function loadTemplates() {
            const { res, data } = await requestJSON('/api/templates');
            if (!res.ok) {
                showStatus('加载模板失败', 'error');
                return;
            }

            templateSelectEl.innerHTML = '<option value="">选择模板...</option>';
            for (const tpl of data.templates || []) {
                const option = document.createElement('option');
                option.value = tpl.id;
                option.textContent = `${tpl.name} (${tpl.description})`;
                templateSelectEl.appendChild(option);
            }
        }

        async function loadFileList() {
            const { res, data } = await requestJSON('/api/files');
            if (!res.ok) {
                showStatus('加载文件列表失败', 'error');
                return;
            }

            const files = data.files || [];
            fileSelectEl.innerHTML = '<option value="">选择文件...</option>';
            for (const file of files) {
                const option = document.createElement('option');
                option.value = file;
                option.textContent = file;
                fileSelectEl.appendChild(option);
            }
        }

        async function openFile(path) {
            if (isDirty && !confirm('当前内容未保存，确认切换文件？')) {
                fileSelectEl.value = currentFile;
                return;
            }

            if (!path) {
                currentFile = '';
                updateVersion(null);
                editorEl.value = '';
                updatePreview('');
                setDirty(false);
                document.getElementById('delete-btn').disabled = true;
                return;
            }

            const { res, data } = await requestJSON(`/api/files/${encodeURIComponent(path)}`);
            if (!res.ok) {
                showStatus(`加载失败：${data.detail || '未知错误'}`, 'error');
                return;
            }

            currentFile = data.path;
            fileSelectEl.value = currentFile;
            updateVersion(data.version);
            const merged = maybeRestoreDraftForPath(currentFile, data.content);
            editorEl.value = merged;
            updatePreview(merged);
            if (merged === data.content) {
                setDirty(false);
            }
            document.getElementById('delete-btn').disabled = false;
        }

        async function saveFile(force = false) {
            let targetPath = currentFile;
            if (!targetPath) {
                const filename = prompt('请输入文件名（例如：notes.md）', 'untitled.md');
                if (!filename) return;
                targetPath = filename.endsWith('.md') ? filename : `${filename}.md`;
            }

            const payload = {
                path: targetPath,
                content: editorEl.value,
                base_version: currentVersion,
                force,
            };
            const { res, data } = await requestJSON('/api/files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (res.status === 409) {
                const detail = data.detail || {};
                const overwrite = confirm('检测到并发修改冲突。是否覆盖远端版本（谨慎）？');
                if (overwrite) {
                    return saveFile(true);
                }
                if (detail.current_content) {
                    const reload = confirm('是否加载服务器最新内容？');
                    if (reload) {
                        editorEl.value = detail.current_content;
                        updatePreview(detail.current_content);
                        updateVersion(detail.current_version || null);
                        setDirty(true);
                    }
                }
                return;
            }

            if (!res.ok) {
                showStatus(`保存失败：${data.detail || '未知错误'}`, 'error');
                return;
            }

            currentFile = data.path;
            fileSelectEl.value = currentFile;
            updateVersion(data.version);
            setDirty(false);
            clearDraft(currentFile);
            clearDraft('');
            await loadFileList();
            showStatus('已保存', 'success');
        }

        async function createBlankFile() {
            if (isDirty && !confirm('当前内容未保存，确认新建空白文档？')) {
                return;
            }

            const filename = prompt('请输入新文件名（例如：notes.md）', 'untitled.md');
            if (!filename) return;

            const finalFilename = filename.endsWith('.md') ? filename : `${filename}.md`;
            const initialContent = `# ${finalFilename.replace('.md', '')}\n\n开始编写...`;

            currentFile = finalFilename;
            updateVersion(null);
            editorEl.value = initialContent;
            updatePreview(initialContent);
            setDirty(true);
            await saveFile(false);
            document.getElementById('delete-btn').disabled = false;
        }

        async function createFromTemplate() {
            if (isDirty && !confirm('当前内容未保存，确认使用模板新建？')) {
                return;
            }

            const templateId = templateSelectEl.value;
            if (!templateId) {
                showStatus('请先选择模板', 'warn');
                return;
            }

            const filename = prompt('请输入新文件名（例如：weekly/2026w10.md）', 'weekly/new.md');
            if (!filename) return;
            const finalFilename = filename.endsWith('.md') ? filename : `${filename}.md`;

            const project = document.getElementById('template-project').value || null;

            const { res, data } = await requestJSON('/api/files/from-template', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    path: finalFilename,
                    template_id: templateId,
                    project,
                    force: false,
                }),
            });

            if (res.status === 409) {
                const overwrite = confirm('文件已存在且版本不一致，是否覆盖创建？');
                if (!overwrite) return;

                const forced = await requestJSON('/api/files/from-template', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: finalFilename,
                        template_id: templateId,
                        project,
                        force: true,
                    }),
                });
                if (!forced.res.ok) {
                    showStatus(`模板创建失败：${forced.data.detail || '未知错误'}`, 'error');
                    return;
                }
            } else if (!res.ok) {
                showStatus(`模板创建失败：${data.detail || '未知错误'}`, 'error');
                return;
            }

            await loadFileList();
            await openFile(finalFilename);
            setDirty(false);
            showStatus('模板文档已创建', 'success');
        }

        function uploadImage() {
            document.getElementById('image-upload').click();
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            event.target.value = '';
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            const { res, data } = await requestJSON('/api/upload', {
                method: 'POST',
                body: formData,
            });

            if (!res.ok) {
                showStatus(`上传失败：${data.detail || '未知错误'}`, 'error');
                return;
            }

            const markdown = `![${file.name}](${data.url})`;
            const start = editorEl.selectionStart;
            const end = editorEl.selectionEnd;
            const before = editorEl.value.substring(0, start);
            const after = editorEl.value.substring(end);
            editorEl.value = before + markdown + after;
            editorEl.selectionStart = editorEl.selectionEnd = start + markdown.length;
            updatePreview(editorEl.value);
            setDirty(true);
            scheduleDraftAutoSave();
            showStatus('图片已上传', 'success');
        }

        async function deleteFile() {
            if (!currentFile) {
                showStatus('请先选择文件', 'warn');
                return;
            }
            if (!confirm(`确定删除 ${currentFile} 吗？`)) return;

            const { res, data } = await requestJSON(`/api/files/${encodeURIComponent(currentFile)}`, {
                method: 'DELETE',
            });
            if (!res.ok) {
                showStatus(`删除失败：${data.detail || '未知错误'}`, 'error');
                return;
            }

            clearDraft(currentFile);
            currentFile = '';
            updateVersion(null);
            editorEl.value = '';
            updatePreview('');
            setDirty(false);
            fileSelectEl.value = '';
            document.getElementById('delete-btn').disabled = true;
            await loadFileList();
            showStatus('文件已删除', 'success');
        }

        editorEl.addEventListener('input', () => {
            updatePreview(editorEl.value);
            setDirty(true);
            scheduleDraftAutoSave();
        });

        fileSelectEl.addEventListener('change', function () {
            openFile(this.value);
        });

        window.addEventListener('beforeunload', (event) => {
            if (!isDirty) return;
            event.preventDefault();
            event.returnValue = '';
        });

        async function bootstrap() {
            await loadSession();
            await loadTemplates();
            await loadFileList();
            maybeRestoreUnsavedDraft();
        }

        bootstrap();
    </script>
</body>
</html>
