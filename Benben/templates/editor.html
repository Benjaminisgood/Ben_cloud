<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benben Editor</title>
    <link rel="stylesheet" href="/static/editor.css">
</head>
<body>
    <div class="app-shell" data-view="template">
        <header class="menu-bar">
            <div class="menu-cluster menu-cluster--left">
                <div class="brand-lockup">
                    <div class="brand-mark">Bb</div>
                    <div class="brand-copy">
                        <strong>Benben</strong>
                        <span>Markdown + Slides</span>
                    </div>
                </div>

                <label class="menu-field">
                    <span>文件</span>
                    <select id="file-switcher">
                        <option value="__none__">未选择文件</option>
                    </select>
                </label>

                <button type="button" class="ghost-btn compact-btn" id="refresh-files-btn">刷新</button>

                <div class="status-chip">
                    <span>路径</span>
                    <strong id="current-path-chip">未保存</strong>
                </div>
            </div>

            <nav class="module-nav" aria-label="模块切换">
                <button type="button" id="view-template-btn" class="active">模版</button>
                <button type="button" id="view-write-btn">写作</button>
                <button type="button" id="view-document-btn">文档</button>
                <button type="button" id="view-slides-btn">幻灯片</button>
            </nav>

            <div class="menu-cluster menu-cluster--right">
                <div class="status-chip">
                    <span>会话</span>
                    <strong id="session-meta">未登录</strong>
                </div>

                <div class="status-chip">
                    <span>草稿</span>
                    <strong id="autosave-meta">草稿未缓存</strong>
                </div>

                <div class="action-stack">
                    <button type="button" class="ghost-btn" data-action="new-blank">新建空白</button>
                    <button type="button" class="secondary-btn" data-action="save">保存</button>
                    <button type="button" class="ghost-btn" id="export-btn">导出</button>
                    <button type="button" class="primary-btn" data-action="present">放映</button>
                    <button type="button" class="danger-btn" id="delete-btn" disabled>删除</button>
                </div>
            </div>
        </header>

        <main class="module-stage">
            <section class="module-panel" id="template-view">
                <div class="template-layout">
                    <section class="panel template-catalog-panel">
                        <div class="panel-heading">
                            <div>
                                <p class="section-kicker">Templates</p>
                                <h1>模版</h1>
                            </div>
                        </div>

                        <div class="template-catalog" id="template-catalog"></div>
                    </section>

                    <section class="panel template-compose-panel">
                        <div class="panel-heading">
                            <div>
                                <p class="section-kicker">Compose</p>
                                <h2 id="selected-template-name">选择一个模板</h2>
                                <p class="panel-copy" id="selected-template-desc">选择左侧模板后，在这里填写路径并创建文稿。</p>
                            </div>
                        </div>

                        <label class="field">
                            <span>目标路径</span>
                            <input id="new-file-path" type="text" placeholder="例如：weekly/2026w10.md">
                        </label>

                        <label class="field">
                            <span>项目名</span>
                            <input id="template-project" type="text" placeholder="例如：Benoss 协作周报">
                        </label>

                        <select id="template-select" hidden>
                            <option value="">选择模板...</option>
                        </select>

                        <div class="action-row">
                            <button type="button" class="secondary-btn" id="template-create-btn">用模板创建</button>
                            <button type="button" class="ghost-btn" data-action="new-blank">新建空白</button>
                            <button type="button" class="ghost-btn" id="insert-report-btn">插入汇报骨架</button>
                        </div>

                        <div class="template-meta-block">
                            <div class="meta-row">
                                <span>分类</span>
                                <strong id="selected-template-category">-</strong>
                            </div>
                            <div class="meta-row">
                                <span>变量</span>
                                <div class="chip-row" id="selected-template-variables">
                                    <span class="token-chip">暂无</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </section>

            <section class="module-panel hidden" id="write-view">
                <section class="panel editor-panel">
                    <div class="editor-head">
                        <div>
                            <p class="section-kicker">Writing</p>
                            <h1 id="editor-title">未命名文档</h1>
                            <p class="panel-copy" id="editor-state">未选择文件</p>
                        </div>

                        <div class="chip-row chip-row--stats">
                            <span class="token-chip" id="version-state">version: -</span>
                            <span class="token-chip" id="draft-state">草稿未缓存</span>
                            <span class="token-chip">字数 <strong id="word-count">0</strong></span>
                            <span class="token-chip">分页 <strong id="slide-count">1</strong></span>
                            <span class="token-chip">阅读 <strong id="read-time">0 分钟</strong></span>
                        </div>
                    </div>

                    <div class="slash-hint-bar">
                        <span>输入 <code>/</code> 唤出命令，例如 <code>/assets</code>、<code>/slide</code>、<code>/summary</code></span>
                    </div>

                    <div class="editor-frame">
                        <textarea id="editor" placeholder="# 今日同步&#10;&#10;一句话结论&#10;&#10;输入 /slide 或直接写 --- 来分页"></textarea>

                        <div id="slash-panel" class="slash-panel hidden" aria-hidden="true">
                            <div class="slash-panel-head">
                                <span>命令</span>
                                <strong id="slash-query">/</strong>
                            </div>
                            <div class="slash-list" id="slash-list"></div>
                        </div>
                    </div>
                </section>
            </section>

            <section class="module-panel hidden" id="document-view">
                <section class="panel document-panel">
                    <div class="doc-preview-frame">
                        <div id="preview" class="markdown-body"></div>
                    </div>
                </section>
            </section>

            <section class="module-panel hidden" id="slides-view">
                <section class="panel slides-panel">
                    <div class="slides-layout">
                        <div class="slide-stage" id="slide-stage"></div>
                        <div class="slide-strip" id="slide-strip"></div>
                    </div>
                </section>
            </section>
        </main>

        <input type="file" id="image-upload" accept="image/*" hidden>
    </div>

    <div id="status" class="status"></div>

    <div id="asset-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-head">
                <div>
                    <p class="section-kicker">Assets</p>
                    <h2>插入资源</h2>
                </div>
                <button type="button" class="ghost-btn compact-btn" id="asset-cancel-btn">关闭</button>
            </div>

            <label class="field">
                <span>资源地址</span>
                <input id="asset-url" type="url" placeholder="https://example.com/image.png">
            </label>

            <label class="field">
                <span>Alt / 标题</span>
                <input id="asset-alt" type="text" placeholder="例如：流程图">
            </label>

            <div class="action-row">
                <button type="button" class="secondary-btn" id="asset-insert-btn">插入网络资源</button>
                <button type="button" class="ghost-btn" id="asset-upload-btn">上传本地图片</button>
            </div>
        </div>
    </div>

    <div id="presentation-overlay" class="presentation-overlay" aria-hidden="true">
        <div class="presentation-toolbar">
            <div>
                <p class="overlay-label">Presentation Mode</p>
                <strong id="presentation-position">第 1 / 1 页</strong>
            </div>
            <div class="presentation-shortcuts">方向键 / 空格切页，Esc 退出，F 切换全屏</div>
            <button type="button" class="overlay-close" id="presentation-close-btn">结束放映</button>
        </div>

        <div class="presentation-stage" id="presentation-stage"></div>

        <div class="presentation-controls">
            <button type="button" class="overlay-nav-btn" id="presentation-prev-btn">上一页</button>
            <button type="button" class="overlay-nav-btn" id="presentation-next-btn">下一页</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" crossorigin="anonymous"></script>
    <script src="/static/editor.js"></script>
</body>
</html>
