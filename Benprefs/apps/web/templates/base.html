
<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary: {{ theme.primary if theme else '#9b3d23' }};
            --secondary: {{ theme.secondary if theme else '#f2a541' }};
            --canvas: {{ theme.canvas if theme else '#f6eee3' }};
            --ink: {{ theme.ink if theme else '#2f2118' }};
        }
    </style>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
